name: CI/CD Pipeline

# NOTE ON SERVICENOW INTEGRATION MODEL:
# Pipeline/repo visibility (branches, commits, workflow runs) comes from
# ServiceNow's pull-based discovery via a classic PAT on a GitHub tool in
# DevOps > Tools — no GitHub-side config needed for that.
#
# Change record creation below uses the PUSH model instead: the
# ServiceNow/servicenow-devops-change GitHub Action calls into ServiceNow
# directly, authenticating via a REST API Key token (not username/password —
# this instance enforces SSO, which blocks basic-auth login for any user,
# including dedicated integration accounts).
# Required GitHub repo secrets for this:
#   SN_DEVOPS_INTEGRATION_TOKEN - REST API Key token (System Web Services >
#                                 API Access Policies > REST API Key)
#   SN_INSTANCE_URL             - e.g. https://cppinvqa.service-now.com
#   SN_ORCHESTRATION_TOOL_ID    - sys_id of the GitHub tool in DevOps > Tools

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ---------------------------------------------------------------------
  # 1. BUILD & UNIT TEST
  # ---------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Run unit tests with coverage
        run: npm test

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/- name: Register Artifact in ServiceNow
        uses: ServiceNow/servicenow-devops-register-artifact@v3.1.0
        with:
          devops-integration-token: ${{ secrets.SN_DEVOPS_INTEGRATION_TOKEN }}
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          context-github: ${{ toJSON(github) }}
          job-name: 'Build'
          artifacts: |
            [
              {
                "name": "hpa",
                "version": "1.${{ github.run_number }}",
                "semanticVersion": "1.${{ github.run_number }}.0",
                "repositoryName": "${{ github.repository }}"
              }
            ]
  # ---------------------------------------------------------------------
  # 2. SECURITY SCANNING (mocked — swap in a real scanner later)
  # ---------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run mock security scan
        run: |
          echo "Running mock SAST scan..."
          mkdir -p security-reports
          cat > security-reports/results.json << 'EOF'
          {
            "scanner": "mock-sast",
            "critical": 0,
            "high": 0,
            "medium": 2,
            "low": 5,
            "status": "passed"
          }
          EOF
          echo "Mock scan complete — 0 critical, 0 high findings."
          cat security-reports/results.json

      - name: Upload security report artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-reports/

  # ---------------------------------------------------------------------
  # 3. SONARQUBE CODE QUALITY SCAN (SonarCloud, CI-based analysis)
  # ---------------------------------------------------------------------
  sonar-scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Run tests for coverage
        run: npm test

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # SonarCloud itself doesn't produce a local report file — results live
      # entirely on sonarcloud.io. This step just writes a small pointer
      # file so an artifact exists here for parity with the other jobs.
      - name: Write Sonar summary artifact
        if: always()
        run: |
          mkdir -p sonar-summary
          cat > sonar-summary/summary.json << EOF
          {
            "organization": "singhgurtejcpp",
            "projectKey": "singhgurtejcpp_hpa",
            "dashboardUrl": "https://sonarcloud.io/project/overview?id=singhgurtejcpp_hpa",
            "note": "Full findings (bugs, vulnerabilities, code smells, coverage, quality gate) are on the SonarCloud dashboard, not in this file."
          }
          EOF
          cat sonar-summary/summary.json

      - name: Upload Sonar summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-summary
          path: sonar-summary/

  # ---------------------------------------------------------------------
  # 4a. CHANGE CREATION — AUTOMATED (develop / feature branches)
  #     "Standard change" style — no manual approval required.
  # ---------------------------------------------------------------------
  change-auto:
    name: Create Standard Change (Auto)
    runs-on: ubuntu-latest
    needs: [security-scan, sonar-scan]
    if: github.ref != 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ServiceNow Change - Standard (auto-approved)
        uses: ServiceNow/servicenow-devops-change@v6.1.0
        with:
          devops-integration-token: ${{ secrets.SN_DEVOPS_INTEGRATION_TOKEN }}
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          context-github: ${{ toJSON(github) }}
          job-name: 'Create Standard Change (Auto)'
          change-request: |
            {
              # "setCloseCode": "true",
              # "autoCloseChange": true,
              "attributes": {
                "short_description": "Automated deploy - ${{ github.ref_name }} - build ${{ github.run_number }}",
                "description": "Standard change auto-created for non-prod branch ${{ github.ref_name }}.",
                "implementation_plan": "Automated CI/CD deploy via GitHub Actions.",
                "backout_plan": "Redeploy previous successful build artifact.",
                "test_plan": "Unit tests, security scan, and SonarQube scan executed in pipeline."
              }
            }

  # ---------------------------------------------------------------------
  # 4b. CHANGE CREATION — MANUAL APPROVAL (main branch)
  #     "Normal change" style — pipeline pauses until change is approved
  #     in ServiceNow. The action polls until state changes.
  # ---------------------------------------------------------------------
  change-manual:
    name: Create Normal Change (Manual Approval)
    runs-on: ubuntu-latest
    needs: [security-scan, sonar-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ServiceNow Change - Normal (requires approval)
        uses: ServiceNow/servicenow-devops-change@v6.1.0
        with:
          devops-integration-token: ${{ secrets.SN_DEVOPS_INTEGRATION_TOKEN }}
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          context-github: ${{ toJSON(github) }}
          job-name: 'Create Normal Change (Manual Approval)'
          change-request: |
            {
              "attributes": {
                "short_description": "Production deploy - build ${{ github.run_number }}",
                "description": "Normal change requiring manual approval for production deploy from main.",
                "implementation_plan": "Automated CI/CD deploy via GitHub Actions once change is approved.",
                "backout_plan": "Redeploy previous successful production artifact.",
                "test_plan": "Unit tests, security scan, and SonarQube scan executed and attached in pipeline."
              }
            }
        # This step will pause the workflow (poll) until the change request
        # is approved (or rejected) in ServiceNow.

  # ---------------------------------------------------------------------
  # 5. DEPLOY (runs only after the relevant change gate passes)
  # ---------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [change-auto, change-manual]
    if: always() && (needs.change-auto.result == 'success' || needs.change-manual.result == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy (simulated)
        run: |
          echo "Deploying build ${{ github.run_number }} from branch ${{ github.ref_name }}"
          echo "This is a simulated deploy step — replace with real deploy commands."