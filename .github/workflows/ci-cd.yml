name: CI/CD Pipeline

# NOTE ON SERVICENOW INTEGRATION MODEL:
# This workflow deliberately contains NO ServiceNow-facing steps and requires
# NO GitHub secrets. ServiceNow DevOps Change Velocity is configured to pull
# data from GitHub using a classic PAT on the ServiceNow side (a GitHub tool
# configured in ServiceNow). That pull-based discovery is what surfaces this
# pipeline's runs, branches, and commits in ServiceNow — nothing here needs
# to push to ServiceNow for that to work.
#
# If you later want security-scan results or change records to appear as
# first-class ServiceNow records (not just "a workflow ran"), that requires
# the push-based ServiceNow GitHub Actions (servicenow-devops-change,
# servicenow-devops-security-result, servicenow-devops-sonar, etc.), which
# need their own GitHub-side secrets (SN_DEVOPS_INTEGRATION_TOKEN,
# SN_INSTANCE_URL, SN_ORCHESTRATION_TOOL_ID). That's out of scope for now.

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ---------------------------------------------------------------------
  # 1. BUILD & UNIT TEST
  # ---------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Run unit tests with coverage
        run: npm test

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ---------------------------------------------------------------------
  # 2. SECURITY SCANNING (mocked — swap in a real scanner later)
  # ---------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run mock security scan
        run: |
          echo "Running mock SAST scan..."
          mkdir -p security-reports
          cat > security-reports/results.json << 'EOF'
          {
            "scanner": "mock-sast",
            "critical": 0,
            "high": 0,
            "medium": 2,
            "low": 5,
            "status": "passed"
          }
          EOF
          echo "Mock scan complete — 0 critical, 0 high findings."
          cat security-reports/results.json

      - name: Upload security report artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-reports/

  # ---------------------------------------------------------------------
  # 3. SONARQUBE CODE QUALITY SCAN (mock-tolerant, real if secrets exist)
  # ---------------------------------------------------------------------
  sonar-scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests for coverage
        run: npm test

      # Real SonarCloud/SonarQube scan. Only runs if SONAR_TOKEN is set as a
      # secret. If you never add it, this step is skipped and the mock
      # result below is used instead so the pipeline stays green.
      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Mock SonarQube result (used until real Sonar is configured)
        if: ${{ env.SONAR_TOKEN == '' }}
        run: |
          echo "SONAR_TOKEN not set — generating mock Sonar result."
          echo "Bugs: 0 | Vulnerabilities: 0 | Code Smells: 3 | Coverage: 92%"

  # ---------------------------------------------------------------------
  # 4. DEPLOY (simulated)
  # ---------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [security-scan, sonar-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy (simulated)
        run: |
          echo "Deploying build ${{ github.run_number }} from branch ${{ github.ref_name }}"
          echo "This is a simulated deploy step — replace with real deploy commands."
